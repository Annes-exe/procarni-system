name: Weekly Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # Se ejecuta cada domingo a medianoche
  workflow_dispatch:   # Permite activarlo manualmente para pruebas

jobs:
  backup:
    name: Create and Store Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          pg_dump "$DATABASE_URL" | gzip > backup_procarni_$(date +%Y-%m-%d).sql.gz

      - name: Upload Backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-procarni
          path: backup_procarni_*.sql.gz
          retention-days: 30
