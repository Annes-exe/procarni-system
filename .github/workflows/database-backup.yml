name: Weekly Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # Todos los domingos a medianoche
  workflow_dispatch:   # Ejecución manual para pruebas

jobs:
  backup:
    name: Create and Store Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 Client
        run: |
          # Añadir el repositorio oficial de PostgreSQL para Ubuntu
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # Instalar específicamente la versión 17
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          echo "Iniciando pg_dump con Postgres 17..."
          # Forzamos el uso del binario de la versión 17 instalada
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" --no-owner --no-privileges > backup_full.sql
          
          if [ -s backup_full.sql ]; then
            SIZE=$(stat -c%s "backup_full.sql")
            echo "✅ Backup generado con éxito. Tamaño: $SIZE bytes."
            gzip -c backup_full.sql > "backup_procarni_$(date +%Y-%m-%d).sql.gz"
          else
            echo "❌ ERROR: El archivo de backup está vacío. Revisa la conexión."
            exit 1
          fi

      - name: Set Artifact Name with Date Range
        id: set-name
        run: |
          CURR_DATE=$(date +%d-%m-%Y)
          PREV_DATE=$(date -d "7 days ago" +%d-%m-%Y)
          echo "ARTIFACT_NAME=db-backup-procarni $PREV_DATE a $CURR_DATE" >> $GITHUB_OUTPUT

      - name: Upload Backup to GitHub Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.ARTIFACT_NAME }}
          path: backup_procarni_*.sql.gz
          retention-days: 30
      - name: Create System Notification
        if: success()
        env:
          DATABASE_URL: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          CURR_DATE=$(date +%d-%m-%Y)
          PREV_DATE=$(date -d "7 days ago" +%d-%m-%Y)
          
          # Intentamos obtener el ID del administrador por correo (evita fallos por IDs estáticos tras restauraciones)
          # Buscamos primero en auth.users por el correo específico
          USER_ID=$(/usr/lib/postgresql/17/bin/psql "$DATABASE_URL" -t -A -c "SELECT id FROM auth.users WHERE email = 'sistemasprocarni2025@gmail.com' LIMIT 1;")
          
          # Si no se encuentra, buscamos cualquier admin en public.profiles como respaldo
          if [ -z "$USER_ID" ]; then
            USER_ID=$(/usr/lib/postgresql/17/bin/psql "$DATABASE_URL" -t -A -c "SELECT id FROM public.profiles WHERE role = 'admin' LIMIT 1;")
          fi
          
          if [ -n "$USER_ID" ]; then
            echo "Enviando notificación al usuario: $USER_ID"
            /usr/lib/postgresql/17/bin/psql "$DATABASE_URL" -c "INSERT INTO notifications (user_id, title, message, type) VALUES ('$USER_ID', 'Respaldo del Sistema', 'Backup semanal ($PREV_DATE a $CURR_DATE) generado con éxito. Ya puedes descargarlo.', 'reminder');"
          else
            echo "⚠️ No se encontró un usuario administrador válido para notificar. El backup se guardó correctamente como artefacto."
          fi
